fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      - id: editorconfig-checker
        name: editorconfig-checker
        entry: ec -config .editorconfig-checker.json
        language: system
      - id: linters-ruff
        name: ruff
        entry: ruff check .
        language: system
        pass_filenames: no
