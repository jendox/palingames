{% load static i18n %}

<nav
  aria-label="{% trans 'Главное меню' %}"
  data-mobile-bottom-nav
  class="fixed inset-x-0 bottom-0 z-30 sm:hidden border-t border-transparent
    bg-[color:var(--color-white)]/80 backdrop-blur-md"
>
  <div class="mx-auto flex max-w-6xl items-stretch justify-between px-4 pb-[calc(14px+env(safe-area-inset-bottom))] pt-[17px]">
    <a
      href="{% url 'home' %}"
      data-mobile-nav-item
      class="mobile-nav-item flex flex-1 flex-col items-center justify-end gap-[5px] text-center text-[var(--color-pink)] no-underline"
      {% if request.resolver_match.url_name == "home" %}aria-current="page"{% endif %}
    >
      <img
        src="{% static 'images/header/menu-main-mobile.svg' %}"
        alt=""
        class="h-[20px] w-[22px]"
        aria-hidden="true"
        draggable="false"
      >
      <span class="text-[12px] font-semibold leading-[12px]">{% trans "Главная" %}</span>
    </a>

    <a
      href="{% url 'catalog' %}"
      data-mobile-nav-item
      class="mobile-nav-item flex flex-1 flex-col items-center justify-end gap-[5px] text-center text-[var(--color-pink)] no-underline"
    >
      <img
        src="{% static 'images/header/menu-catalog-mobile.svg' %}"
        alt=""
        class="h-[20px] w-[22px]"
        aria-hidden="true"
        draggable="false"
      >
      <span class="text-[12px] font-semibold leading-[12px]">{% trans "Каталог" %}</span>
    </a>

    <a
      href="#"
      data-mobile-nav-item
      class="mobile-nav-item flex flex-1 flex-col items-center justify-end gap-[5px] text-center text-[var(--color-pink)] no-underline"
    >
      <img
        src="{% static 'images/header/menu-cart-mobile.svg' %}"
        alt=""
        class="h-[20px] w-[22px]"
        aria-hidden="true"
        draggable="false"
      >
      <span class="text-[12px] font-semibold leading-[12px]">{% trans "Корзина" %}</span>
    </a>

    <a
      href="#"
      data-mobile-nav-item
      class="mobile-nav-item flex flex-1 flex-col items-center justify-end gap-[5px] text-center text-[var(--color-pink)] no-underline"
    >
      <img
        src="{% static 'images/header/menu-favorite-mobile.svg' %}"
        alt=""
        class="h-[20px] w-[22px]"
        aria-hidden="true"
        draggable="false"
      >
      <span class="text-[12px] font-semibold leading-[12px]">{% trans "Избранное" %}</span>
    </a>

    {% if user.is_authenticated %}
      <a
        href="{% url 'account' %}"
        data-mobile-nav-item
        class="mobile-nav-item flex flex-1 flex-col items-center justify-end gap-[5px] text-center text-[var(--color-pink)] no-underline"
        {% if request.resolver_match.url_name == "account" %}aria-current="page"{% endif %}
      >
        <img
          src="{% static 'images/header/menu-account-mobile.svg' %}"
          alt=""
          class="h-[20px] w-[22px]"
          aria-hidden="true"
          draggable="false"
        >
        <span class="text-[12px] font-semibold leading-[12px]">{% trans "Аккаунт" %}</span>
      </a>
    {% else %}
      <button
        type="button"
        data-dialog-open="loginDialog"
        data-post-login-redirect="{% url 'account' %}"
        data-mobile-nav-item
        aria-controls="loginDialog"
        class="mobile-nav-item flex flex-1 cursor-pointer flex-col items-center justify-end gap-[5px] text-center text-[var(--color-pink)]"
      >
        <img
          src="{% static 'images/header/menu-account-mobile.svg' %}"
          alt=""
          class="h-[20px] w-[22px]"
          aria-hidden="true"
          draggable="false"
        >
        <span class="text-[12px] font-semibold leading-[12px]">{% trans "Аккаунт" %}</span>
      </button>
    {% endif %}
  </div>
</nav>
