{% if messages %}
  <div class="space-y-3 mb-6">
    {% for message in messages %}
      <div class="rounded-lg px-4 py-3 text-sm
                  {% if 'success' in message.tags %} bg-green-50 text-green-800 border border-green-200
                  {% elif 'error' in message.tags %} bg-red-50 text-red-800 border border-red-200
                  {% elif 'warning' in message.tags %} bg-yellow-50 text-yellow-800 border border-yellow-200
                  {% else %} bg-blue-50 text-blue-800 border border-blue-200
                  {% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}
