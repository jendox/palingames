{% load static i18n %}

<section class="mt-[50px]">
  <div class="flex items-start gap-[8px]">
    <h2 class="text-[24px] font-bold uppercase leading-[28px] text-[var(--color-black)]">
      {% trans "Похожие товары" %}
    </h2>
    <img
      src="{% static 'images/decor/stars/star-orange.svg' %}"
      alt=""
      class="mt-[2px] h-[18px] w-[18px]"
      aria-hidden="true"
      draggable="false"
    >
  </div>

  <div class="mt-[24px] overflow-x-auto pb-[8px] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
    <div class="flex min-w-max gap-[12px]">
      {% for product in related_products %}
        {% include "components/related_products/mobile_card.html" %}
      {% endfor %}
    </div>
  </div>

  <div class="mt-[20px] flex items-center justify-between">
    <div class="flex items-center gap-[8px]">
      <span class="size-[6px] rounded-full bg-[var(--color-green)]"></span>
      <span class="size-[6px] rounded-full bg-[var(--color-green)]/30"></span>
      <span class="size-[6px] rounded-full bg-[var(--color-green)]/30"></span>
    </div>

    <a href="{% url 'catalog' %}" class="text-[14px] font-bold uppercase leading-none text-[var(--color-black)] underline underline-offset-[3px]">
      {% trans "Посмотреть все" %}
    </a>
  </div>
</section>
