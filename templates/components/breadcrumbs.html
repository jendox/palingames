{% load i18n %}

{% if breadcrumbs %}
  <nav aria-label="{% trans 'Хлебные крошки' %}" class="w-full">
    <ol class="text-breadcrumbs-trail flex flex-wrap items-center gap-y-[2px]">
      {% for crumb in breadcrumbs %}
        <li class="flex items-center">
          {% if not forloop.first %}
            <span class="breadcrumb-sep select-none whitespace-pre" aria-hidden="true"> / </span>
          {% endif %}
          {% if crumb.url and not forloop.last %}
            <a href="{{ crumb.url }}">{{ crumb.title }}</a>
          {% else %}
            <span aria-current="page">{{ crumb.title }}</span>
          {% endif %}
        </li>
      {% endfor %}
    </ol>
  </nav>
{% endif %}
