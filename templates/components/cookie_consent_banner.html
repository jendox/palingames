{% load i18n %}
<style>
  #cookie-consent-panel:popover-open {
    left: 0.75rem;
    right: auto;
    top: auto;
    bottom: 7.5rem;
    margin: 0;
    position: fixed;
  }
  @media (min-width: 1024px) {
    #cookie-consent-panel:popover-open {
      left: 1.5rem;
      bottom: 1.5rem;
    }
  }
</style>
<div
  id="cookie-consent-panel"
  popover="manual"
  class="cookie-consent-popover m-0 box-border max-h-[min(85vh,520px)] w-[min(380px,calc(100vw-1.5rem))] max-w-[calc(100vw-1.5rem)] overflow-y-auto rounded-2xl border border-white/50 bg-white/75 p-4 text-left shadow-2xl shadow-black/10 backdrop-blur-md supports-[backdrop-filter]:bg-white/65"
  role="dialog"
  aria-modal="false"
  aria-labelledby="cookie-consent-title"
  aria-hidden="true"
>
  <div class="flex flex-col gap-3">
    <div class="text-sm leading-relaxed text-gray-800">
      <p id="cookie-consent-title" class="font-semibold text-gray-900">
        {% trans "Cookie и статистика" %}
      </p>
      <p class="mt-2">
        {% trans "Мы используем cookie, чтобы сайт работал стабильно, и — по вашему выбору — для анализа посещаемости." %}
        {% trans "Подробнее об" %}
        <a href="{% url 'privacy-policy' %}" class="text-[var(--color-turquoise)] underline decoration-1 underline-offset-2 hover:no-underline">{% trans "обработке персональных данных" %}</a>
        {% trans "и" %}
        <a href="{% url 'cookie-policy' %}" class="text-[var(--color-turquoise)] underline decoration-1 underline-offset-2 hover:no-underline">{% trans "политике cookie" %}</a>.
      </p>
    </div>
    <div class="flex flex-col gap-2">
      <button
        type="button"
        id="cookie-consent-accept"
        class="w-full cursor-pointer rounded-xl bg-[var(--color-turquoise)] px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:opacity-90"
      >
        {% trans "Принять" %}
      </button>
      <button
        type="button"
        id="cookie-consent-reject"
        class="w-full cursor-pointer rounded-xl border border-gray-400/60 bg-white/50 px-4 py-3 text-sm font-semibold text-gray-800 backdrop-blur-sm transition hover:bg-white/70"
      >
        {% trans "Только необходимые" %}
      </button>
    </div>
  </div>
</div>
