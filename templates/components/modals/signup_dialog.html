{% load static i18n %}

<dialog
  id="signupDialog"
  class="rounded-[30px] bg-white p-0 tracking-normal shadow-xl backdrop:bg-black/50
    w-[92vw] max-w-[990px] h-[92vh] max-h-[845px] overflow-hidden
    fixed left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2
    opacity-0 scale-95 transition duration-150"
  style="background-image: url('{% static 'images/registration_bg.svg' %}');
  background-size: cover; background-position: center; background-repeat: no-repeat;"
>
  <div class="relative h-full w-full">
    <div class="h-full w-full overflow-y-auto px-6 lg:px-0">
      <div class="min-h-full w-full py-10 lg:py-0">
        <div
          class="mx-auto w-full max-w-[428px] lg:absolute lg:left-[512px] lg:top-[110px] lg:w-[428px]"
        >
        <h2 class="font-airfool text-center text-[40px] leading-[40px] text-[var(--color-black)]">
          {% trans "РЕГИСТРАЦИЯ" %}
        </h2>

        <div
          data-form-errors
          class="mt-6 hidden rounded-[10px] border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800"
          role="alert"
        ></div>

        <div
          data-form-success
          class="mt-6 hidden rounded-[10px] border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-900"
          role="status"
        ></div>

        <form
          data-headless-signup-form
          data-headless-endpoint="/_allauth/browser/v1/auth/signup"
          class="mt-[50px]"
          method="post"
          action="#"
        >
          <div class="space-y-[30px]">
            <div class="mx-auto w-full max-w-[428px]">
              <label
                for="signupEmail"
                class="block text-[16px] font-bold leading-[16px] text-[color:var(--color-black-80)]"
              >
                {% trans "Email *" %}
              </label>
            <input
              id="signupEmail"
              type="email"
              name="email"
              autocomplete="email"
                class="mt-[15px] h-[44px] w-full rounded-[10px] border border-[var(--color-grey)] bg-white px-4 text-sm
                  text-[var(--color-black)] placeholder:text-black/40 focus:border-[var(--color-pink)]
                  focus:outline-none focus:ring-2 focus:ring-[var(--color-pink)]/20"
              required
              autofocus
            />
              <p data-field-error="email" class="mt-2 hidden text-sm text-red-700"></p>
            </div>

            <div class="mx-auto w-full max-w-[428px]">
              <label
                for="signupPassword1"
                class="block text-[16px] font-bold leading-[16px] text-[color:var(--color-black-80)]"
              >
                {% trans "Пароль *" %}
              </label>
            <input
              id="signupPassword1"
              type="password"
              name="password1"
              autocomplete="new-password"
                class="mt-[15px] h-[44px] w-full rounded-[10px] border border-[var(--color-grey)] bg-white px-4 text-sm
                  text-[var(--color-black)] placeholder:text-black/40 focus:border-[var(--color-pink)]
                  focus:outline-none focus:ring-2 focus:ring-[var(--color-pink)]/20"
              required
            />
              <p data-field-error="password1" class="mt-2 hidden text-sm text-red-700"></p>
            </div>

            <div class="mx-auto w-full max-w-[428px]">
              <label
                for="signupPassword2"
                class="block text-[16px] font-bold leading-[16px] text-[color:var(--color-black-80)]"
              >
                {% trans "Повторить пароль *" %}
              </label>
            <input
              id="signupPassword2"
              type="password"
              name="password2"
              autocomplete="new-password"
                class="mt-[15px] h-[44px] w-full rounded-[10px] border border-[var(--color-grey)] bg-white px-4 text-sm
                  text-[var(--color-black)] placeholder:text-black/40 focus:border-[var(--color-pink)]
                  focus:outline-none focus:ring-2 focus:ring-[var(--color-pink)]/20"
              required
            />
              <p data-field-error="password2" class="mt-2 hidden text-sm text-red-700"></p>
            </div>
          </div>

          <label class="mt-[25px] inline-flex items-center gap-3 text-[14px] leading-[14px]">
            <input
              type="checkbox"
              name="privacy_consent"
              class="size-[20px] cursor-pointer appearance-none rounded-[1px] border border-[var(--color-pink)]
                bg-[var(--color-white)] shadow-none checked:border-[var(--color-white)] checked:bg-[var(--color-pink)]
                checked:bg-[url(data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2011%2010'%20fill='none'%3E%3Cpath%20d='M1%205.5L4%208.5L10%201.5'%20stroke='%23FBFBFB'%20stroke-width='1'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E)]
                checked:bg-center checked:bg-no-repeat checked:bg-[length:11px_10px]
                focus:outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-pink)]/20"
              checked
              required
            />
            <span class="text-[var(--color-black)]">
              {% trans "Согласен(а) на обработку" %}
              <a href="#" data-privacy-policy class="font-normal text-[var(--color-pink)] hover:underline">
                {% trans "персональных данных" %}
              </a>
            </span>
          </label>

          <button
            type="submit"
            class="mt-[25px] h-[60px] w-full rounded-[10px] bg-[var(--color-pink)] text-[20px] font-bold leading-[20px]
              text-[var(--color-white)] hover:bg-[var(--color-pink-hover)] disabled:opacity-60 cursor-pointer"
          >
            {% trans "Регистрация" %}
          </button>

          <div class="mt-[50px] text-center text-[var(--color-black)] text-[18px] leading-[18px]">
            {% trans "У Вас уже есть аккаунт?" %}
            <a href="#" data-dialog-switch="loginDialog" class="font-bold text-[var(--color-pink)] hover:underline">
              {% trans "Войти" %}
            </a>
          </div>

          <div class="mt-[50px] flex items-center justify-center gap-[25px]">
            {% include "components/modals/_social_buttons.html" %}
          </div>
        </form>
        </div>
      </div>
    </div>
  </div>
</dialog>
