{% load static i18n %}

<div class="relative w-full px-[18px] pb-[30px] pt-[18px]">
  <button
    type="button"
    data-dialog-close
    class="absolute right-[20px] top-[20px] z-20 inline-flex h-[20px] w-[20px] cursor-pointer items-center justify-center"
    aria-label="{% trans 'Закрыть' %}"
  >
    <img
      src="{% static 'images/icons/close-icon.svg' %}"
      alt=""
      class="h-[20px] w-[20px]"
      aria-hidden="true"
      draggable="false"
    >
  </button>

  <div class="relative z-10 flex flex-col items-center text-center">
    <img
      src="{% static 'images/icons/warning-icon.svg' %}"
      alt=""
      class="h-[85px] w-[85px]"
      aria-hidden="true"
      draggable="false"
    >

    <p class="mt-[18px] text-[14px] font-bold leading-none text-[var(--color-black)]">
      {% trans "Уверены что хотите выйти?" %}
    </p>

    <form data-headless-logout-form method="post" action="#" class="mt-[31px] flex flex-col items-center gap-[20px]">
      {% csrf_token %}
      <button type="button" data-dialog-close class="btn-soft-pink h-[40px] w-[246px] text-[12px] leading-[12px]">
        {% trans "Отменить" %}
      </button>
      <button type="submit" class="btn-soft-green h-[40px] w-[246px] text-[12px] leading-[12px]">
        {% trans "Выйти" %}
      </button>
    </form>
  </div>
</div>
