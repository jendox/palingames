{% load static %}

<dialog
  id="loginDialog"
  class="rounded-[24px] bg-white p-0 shadow-xl backdrop:bg-black/50
    w-[92vw] max-w-[520px] overflow-hidden border border-black/10
    fixed left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2
    opacity-0 scale-95 transition duration-150"
>
  <div class="relative p-8 sm:p-10">
    <button
      type="button"
      data-dialog-close
      class="absolute right-6 top-6 rounded-md p-2 text-gray-500 hover:bg-gray-100"
      aria-label="Закрыть"
    >
      ×
    </button>

    <h2 class="font-airfool text-center text-2xl font-black tracking-[0.35em] text-gray-900">ВХОД</h2>

    <form class="mt-7 space-y-4" method="post" action="#">
      {% csrf_token %}

        <div>
          <label class="block text-xs font-semibold text-gray-600">Email *</label>
          <div class="relative mt-1">
            <input
              type="email"
              name="email"
              class="w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 pr-10 text-sm
                focus:outline-none focus:ring-2 focus:ring-black/10"
              required
              autofocus
            />
            <span
              aria-hidden="true"
              class="pointer-events-none absolute right-2 top-1/2 grid size-7 -translate-y-1/2 place-items-center rounded-md bg-gray-200 text-gray-400"
            >
              ⋯
            </span>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600">Пароль *</label>
          <div class="relative mt-1">
            <input
              type="password"
              name="password"
              class="w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 pr-10 text-sm
                focus:outline-none focus:ring-2 focus:ring-black/10"
              required
            />
            <span
              aria-hidden="true"
              class="pointer-events-none absolute right-2 top-1/2 grid size-7 -translate-y-1/2 place-items-center rounded-md bg-gray-200 text-gray-400"
            >
              ⋯
            </span>
          </div>
        </div>

        <label class="inline-flex items-center gap-2 text-xs text-gray-600">
          <input type="checkbox" class="rounded border-gray-300">
          Запомнить
        </label>

        <button
          type="submit"
          class="mt-2 w-full rounded-xl bg-[var(--color-pink)] px-4 py-3 text-sm font-semibold text-[var(--color-white)] shadow-[var(--shadow-default)] hover:bg-[var(--color-pink-hover)]"
        >
          Войти
        </button>

        <div class="pt-1 text-center text-xs text-gray-600">
          <a href="#" data-dialog-switch="passwordResetDialog" class="hover:underline">Забыли пароль?</a>
          <span class="mx-2 text-gray-300">|</span>
          <a href="#" data-dialog-switch="signupDialog" class="font-semibold text-[var(--color-pink)] hover:underline">
            Регистрация
          </a>
        </div>

        <div class="pt-4">
          <div class="flex items-center justify-center gap-3">
            <a
              href="#"
              class="grid size-10 place-items-center rounded-lg border border-gray-200 bg-white shadow-sm hover:bg-gray-50"
            >
              <img src="{% static 'images/social/vk.svg' %}" alt="VK" class="size-5">
            </a>
            <a
              href="#"
              class="grid size-10 place-items-center rounded-lg border border-gray-200 bg-white shadow-sm hover:bg-gray-50"
            >
              <img src="{% static 'images/social/yandex.svg' %}" alt="Yandex" class="size-5">
            </a>
            <a
              href="#"
              class="grid size-10 place-items-center rounded-lg border border-gray-200 bg-white shadow-sm hover:bg-gray-50"
            >
              <img src="{% static 'images/social/google.svg' %}" alt="Google" class="size-5">
            </a>
            <a
              href="#"
              class="grid size-10 place-items-center rounded-lg border border-gray-200 bg-white shadow-sm hover:bg-gray-50"
            >
              <img src="{% static 'images/social/telegram.svg' %}" alt="Telegram" class="size-5">
            </a>
          </div>
        </div>
    </form>
  </div>
</dialog>
