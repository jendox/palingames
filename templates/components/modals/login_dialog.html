{% load static i18n %}

<dialog
  id="loginDialog"
  class="rounded-[30px] bg-white p-0 tracking-normal shadow-xl backdrop:bg-black/50
    w-[92vw] max-w-[949px] h-[92vh] max-h-[845px] overflow-hidden
    fixed left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2
    opacity-0 scale-95 transition duration-150"
  style="background-image: url('{% static 'images/login_bg.svg' %}');
  background-size: cover; background-position: center; background-repeat: no-repeat;"
>
  <div class="relative h-full w-full">
    <div class="h-full w-full overflow-y-auto px-6 py-10 lg:px-0 lg:py-0">
      <div
        class="mx-auto flex w-full max-w-[366px] flex-col lg:absolute lg:left-[59px] lg:top-[144px] lg:h-[572px]
          lg:w-[366px] lg:max-w-none"
      >
        <h2 class="font-airfool text-center text-[40px] leading-[40px] text-[var(--color-black)]">
          {% trans "ВХОД" %}
        </h2>

        <form class="mt-[50px]" method="post" action="#">
          <div>
            <div class="space-y-[30px]">
              <div>
                <label
                  for="loginEmail"
                  class="block text-[16px] font-bold leading-[16px] text-[color:var(--color-black-80)]"
                >
                  {% trans "Email *" %}
                </label>
                <input
                  id="loginEmail"
                  type="email"
                  name="email"
                  autocomplete="email"
                  class="mx-auto mt-[15px] h-[44px] w-full max-w-[364px] rounded-[10px] border border-[var(--color-grey)] bg-white px-4 text-sm
                    text-[var(--color-black)] placeholder:text-black/40 focus:border-[var(--color-pink)]
                    focus:outline-none focus:ring-2 focus:ring-[var(--color-pink)]/20"
                  required
                  autofocus
                />
              </div>

              <div>
                <label
                  for="loginPassword"
                  class="block text-[16px] font-bold leading-[16px] text-[color:var(--color-black-80)]"
                >
                  {% trans "Пароль *" %}
                </label>
                <input
                  id="loginPassword"
                  type="password"
                  name="password"
                  autocomplete="current-password"
                  class="mx-auto mt-[15px] h-[44px] w-full max-w-[364px] rounded-[10px] border border-[var(--color-grey)] bg-white px-4 text-sm
                    text-[var(--color-black)] placeholder:text-black/40 focus:border-[var(--color-pink)]
                    focus:outline-none focus:ring-2 focus:ring-[var(--color-pink)]/20"
                  required
                />
              </div>
            </div>

            <label class="mt-[25px] inline-flex items-center gap-3 text-[14px] leading-[14px]">
            <input
              type="checkbox"
              name="remember"
              class="size-[20px] cursor-pointer appearance-none rounded-[1px] border border-[var(--color-pink)]
                bg-[var(--color-white)] shadow-none checked:border-[var(--color-white)] checked:bg-[var(--color-pink)]
                checked:bg-[url(data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2011%2010'%20fill='none'%3E%3Cpath%20d='M1%205.5L4%208.5L10%201.5'%20stroke='%23FBFBFB'%20stroke-width='1'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E)]
                checked:bg-center checked:bg-no-repeat checked:bg-[length:11px_10px]
                !shadow-none outline-none focus:outline-none focus:shadow-none focus-visible:outline-none focus-visible:shadow-none"
            />
              <span class="text-[var(--color-black)]">{% trans "запомнить" %}</span>
            </label>

            <button
              type="submit"
              class="mx-auto mt-[25px] h-[60px] w-full max-w-[366px] cursor-pointer rounded-[10px] bg-[var(--color-pink)]
                text-[20px] font-bold leading-[20px] text-[var(--color-white)] hover:bg-[var(--color-pink-hover)]
                disabled:opacity-60"
            >
              Войти
            </button>

            <div class="mt-[50px] text-center text-[18px] leading-[18px] text-[var(--color-black)]">
              <a href="#" data-dialog-switch="passwordResetDialog" class="hover:underline">
                {% trans "Забыли пароль?" %}
              </a>
            </div>

            <div class="mt-[20px] text-center text-[18px] leading-[18px]">
              <a href="#" data-dialog-switch="signupDialog" class="font-bold text-[var(--color-pink)] hover:underline">
                {% trans "Регистрация" %}
              </a>
            </div>
          </div>

          <div class="mt-[50px] flex items-center justify-center gap-[25px]">
            {% include "components/modals/_social_buttons.html" %}
          </div>
        </form>
      </div>
    </div>
  </div>
</dialog>
