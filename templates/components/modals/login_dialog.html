{% load static i18n %}

<dialog
  id="loginDialog"
  class="rounded-[30px] bg-white p-0 tracking-normal shadow-xl backdrop:bg-black/50
    w-[92vw] max-w-[949px] h-[92vh] max-h-[845px] overflow-hidden
    fixed left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2
    opacity-0 scale-95 transition duration-150"
>
  <div class="relative h-full w-full">
    <div
      aria-hidden="true"
      class="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-40 sm:hidden"
      style="background-image: url('{% static 'images/login-bg-mobile.svg' %}');"
    ></div>
    <div
      aria-hidden="true"
      class="absolute inset-0 hidden bg-cover bg-center bg-no-repeat sm:block"
      style="background-image: url('{% static 'images/login-bg.svg' %}');"
    ></div>

    <div class="relative z-10 flex h-full w-full flex-col justify-center overflow-y-auto px-6 pt-[24px] pb-[32px] sm:block sm:py-10 lg:px-0 lg:py-0">
      <div
        class="mx-auto flex w-full max-w-[366px] flex-col lg:absolute lg:left-[59px] lg:top-[144px] lg:h-[572px]
          lg:w-[366px] lg:max-w-none"
      >
        <h2 class="font-airfool text-center text-[40px] leading-[40px] text-[var(--color-black)]">
          {% trans "ВХОД" %}
        </h2>

        <div
          data-form-errors
          class="mt-6 hidden rounded-[10px] border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800"
          role="alert"
        ></div>

        <form
          data-headless-login-form
          data-headless-endpoint="/_allauth/browser/v1/auth/login"
          class="mt-[36px] sm:mt-[50px]"
          method="post"
          action="#"
        >
          {% csrf_token %}
          <div>
            <div class="space-y-[30px]">
              <div>
                <label
                  for="loginEmail"
                  class="block text-[16px] font-bold leading-[16px] text-[color:var(--color-black-80)]"
                >
                  {% trans "Email *" %}
                </label>
                <input
                  id="loginEmail"
                  type="email"
                  name="email"
                  autocomplete="email"
                  class="modal-input mx-auto mt-[15px] max-w-[364px]"
                  required
                  autofocus
                />
                <p data-field-error="email" class="mt-2 hidden text-sm text-red-700"></p>
              </div>

              <div>
                <label
                  for="loginPassword"
                  class="block text-[16px] font-bold leading-[16px] text-[color:var(--color-black-80)]"
                >
                  {% trans "Пароль *" %}
                </label>
                <input
                  id="loginPassword"
                  type="password"
                  name="password"
                  autocomplete="current-password"
                  class="modal-input mx-auto mt-[15px] max-w-[364px]"
                  required
                />
                <p data-field-error="password" class="mt-2 hidden text-sm text-red-700"></p>
              </div>
            </div>

            <label class="mt-[25px] inline-flex items-center gap-3 text-[14px] leading-[14px]">
            <input
              type="checkbox"
              name="remember"
              class="checkbox-pink"
            />
              <span class="text-[var(--color-black)]">{% trans "запомнить" %}</span>
            </label>

            <button
              type="submit"
              class="btn-primary mx-auto mt-[25px] w-full max-w-[366px] text-[20px] leading-[20px]"
            >
              Войти
            </button>

            <div class="mt-[40px] text-center text-[18px] leading-[18px] text-[var(--color-black)] sm:mt-[50px]">
              <a href="#" data-dialog-switch="passwordResetDialog" class="hover:underline">
                {% trans "Забыли пароль?" %}
              </a>
            </div>

            <div class="mt-[20px] text-center text-[18px] leading-[18px]">
              <a href="#" data-dialog-switch="signupDialog" class="font-bold text-[var(--color-pink)] hover:underline">
                {% trans "Регистрация" %}
              </a>
            </div>
          </div>

          <div class="mt-[40px] flex items-center justify-center gap-[25px] sm:mt-[50px]">
            {% include "components/modals/_social_buttons.html" %}
          </div>
        </form>
      </div>
    </div>
  </div>
</dialog>
