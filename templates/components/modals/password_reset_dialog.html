<dialog
  id="passwordResetDialog"
  class="rounded-2xl p-0 shadow-xl backdrop:bg-black/50
    w-[92%] max-w-md
    fixed left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2
    opacity-0 scale-95 transition duration-150"
>
  <div class="p-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h2 class="text-lg font-semibold">Восстановление пароля</h2>
        <p class="mt-1 text-sm text-gray-600">Отправим письмо со ссылкой для сброса</p>
      </div>

      <button
        type="button"
        data-dialog-close
        class="rounded-md p-2 hover:bg-gray-100"
        aria-label="Закрыть"
      >
        ✕
      </button>
    </div>

    <form class="mt-5 space-y-4" method="post" action="#">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium">Email</label>
        <input
          type="email"
          name="email"
          placeholder="you@example.com"
          class="mt-1 w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm
            focus:outline-none focus:ring-2 focus:ring-black/20"
          required
          autofocus
        />
      </div>

      <p class="text-xs text-gray-500">
        Если такой email зарегистрирован, мы отправим письмо с инструкцией.
      </p>

      <div class="mt-6 flex gap-2">
        <button
          type="button"
          data-dialog-close
          class="flex-1 rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium hover:bg-gray-50"
        >
          Отмена
        </button>
        <button
          type="submit"
          class="flex-1 rounded-lg bg-black px-4 py-2 text-sm font-medium text-white hover:opacity-90"
        >
          Отправить письмо
        </button>
      </div>

      <p class="pt-2 text-center text-sm text-gray-600">
        Вспомнили пароль?
        <a href="#" data-dialog-switch="loginDialog" class="font-medium hover:underline">Войти</a>
      </p>
    </form>
  </div>
</dialog>
