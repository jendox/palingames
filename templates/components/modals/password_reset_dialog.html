{% load i18n %}
<dialog
  id="passwordResetDialog"
  class="rounded-[30px] bg-white p-0 tracking-normal shadow-xl backdrop:bg-black/50
    w-[92vw] max-w-[520px] overflow-hidden
    fixed left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2
    opacity-0 scale-95 transition duration-150"
>
  <div class="relative h-full w-full">
    <div class="w-full px-6 py-10 sm:px-[50px]">
      <div class="mx-auto w-full max-w-[428px]">
        <h2 class="font-airfool text-center text-[40px] text-[var(--color-black)]">{% trans "СБРОС ПАРОЛЯ" %}</h2>

        <p data-password-reset-request-subtitle class="mt-[20px] text-center text-[18px] text-[var(--color-black)] opacity-60">
          {% trans "Отправим письмо со ссылкой для сброса" %}
        </p>

        <p
          data-password-reset-key-subtitle
          class="mt-[20px] hidden text-center text-[18px] text-[var(--color-black)] opacity-60"
        >
          {% trans "Введите новый пароль" %}
        </p>

        <div
          data-form-errors
          class="mt-6 hidden rounded-[10px] border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800"
          role="alert"
        ></div>

        <div data-password-reset-success class="mt-[40px] hidden text-center">
          <p class="text-[18px] text-[var(--color-black)] opacity-60">
            {% trans "Письмо с инструкцией по сбросу пароля отправлено на адрес" %}
            <span data-password-reset-email class="font-bold text-[var(--color-black)]"></span>.
          </p>
          <button
            type="button"
            data-dialog-close
            class="mt-[40px] h-[60px] w-full rounded-[10px] bg-[var(--color-pink)] text-[18px] font-bold
              text-[var(--color-white)] hover:bg-[var(--color-pink-hover)]"
          >
            {% trans "Закрыть" %}
          </button>
        </div>

        <div data-password-reset-complete-success class="mt-[40px] hidden text-center">
          <p class="text-[18px] text-[var(--color-black)] opacity-60">
            {% trans "Пароль изменён." %}
          </p>
          <div class="mt-[40px] flex flex-col gap-3">
            <button
              type="button"
              data-dialog-close
              class="h-[60px] w-full rounded-[10px] bg-[var(--color-pink)] text-[18px] font-bold
                text-[var(--color-white)] hover:bg-[var(--color-pink-hover)]"
            >
              {% trans "Закрыть" %}
            </button>
            <button
              type="button"
              data-dialog-switch="loginDialog"
              class="h-[60px] w-full rounded-[10px] border border-[var(--color-pink)] bg-white text-[18px] font-bold
                text-[var(--color-pink)] hover:bg-[var(--color-pink)] hover:text-white"
            >
              {% trans "Войти" %}
            </button>
          </div>
        </div>

        <form
          data-headless-password-reset-form
          data-headless-endpoint="/_allauth/browser/v1/auth/password/request"
          class="mt-[40px]"
          method="post"
          action="#"
        >
          <div>
            <label for="passwordResetEmail" class="block text-sm font-bold text-[color:var(--color-black-80)]">
              Email *
            </label>
            <input
              id="passwordResetEmail"
              type="email"
              name="email"
              autocomplete="email"
              class="modal-input mt-[10px]"
              required
              autofocus
            />
          </div>

          <button
            type="submit"
            class="mt-[40px] h-[60px] w-full rounded-[10px] bg-[var(--color-pink)] text-[18px] font-bold
              text-[var(--color-white)] hover:bg-[var(--color-pink-hover)] disabled:opacity-60"
          >
            {% trans "Отправить письмо" %}
          </button>

          <div class="mt-[50px] text-center text-[18px] text-[var(--color-black)]">
            {% trans "Вспомнили пароль?" %}
            <a href="#" data-dialog-switch="loginDialog" class="font-bold text-[var(--color-pink)] hover:underline">
              {% trans "Войти" %}
            </a>
          </div>
        </form>

        <form
          data-headless-password-reset-key-form
          data-headless-endpoint="/_allauth/browser/v1/auth/password/reset"
          class="mt-[40px] hidden"
          method="post"
          action="#"
        >
          <input type="hidden" name="key" value="">

          <div class="space-y-[30px]">
            <div>
              <label
                for="passwordResetNewPassword"
                class="block text-sm font-bold text-[color:var(--color-black-80)]"
              >
                {% trans "Новый пароль *" %}
              </label>
              <input
                id="passwordResetNewPassword"
                type="password"
                name="password"
                autocomplete="new-password"
                class="modal-input mt-[10px]"
                required
              />
              <p data-field-error="password" class="mt-2 hidden text-sm text-red-700"></p>
            </div>

            <div>
              <label
                for="passwordResetNewPassword2"
                class="block text-sm font-bold text-[color:var(--color-black-80)]"
              >
                {% trans "Повторите пароль *" %}
              </label>
              <input
                id="passwordResetNewPassword2"
                type="password"
                name="password2"
                autocomplete="new-password"
                class="modal-input mt-[10px]"
                required
              />
              <p data-field-error="password2" class="mt-2 hidden text-sm text-red-700"></p>
            </div>
          </div>

          <button
            type="submit"
            class="mt-[40px] h-[60px] w-full rounded-[10px] bg-[var(--color-pink)] text-[18px] font-bold
              text-[var(--color-white)] hover:bg-[var(--color-pink-hover)] disabled:opacity-60"
          >
            {% trans "Сохранить пароль" %}
          </button>
        </form>
      </div>
    </div>
  </div>
</dialog>
