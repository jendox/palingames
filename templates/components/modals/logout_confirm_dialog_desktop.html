{% load static i18n %}

<div class="relative w-full px-[70px] py-[60px]">
  <button
    type="button"
    data-dialog-close
    class="absolute right-[25px] top-[25px] inline-flex h-[25px] w-[25px] cursor-pointer items-center justify-center"
    aria-label="{% trans 'Закрыть' %}"
  >
    <img
      src="{% static 'images/icons/close-icon.svg' %}"
      alt=""
      class="h-[25px] w-[25px]"
      aria-hidden="true"
      draggable="false"
    >
  </button>

  <div class="relative z-10 flex flex-col items-center text-center">
    <img
      src="{% static 'images/icons/warning-icon.svg' %}"
      alt=""
      class="h-[127px] w-[127px]"
      aria-hidden="true"
      draggable="false"
    >

    <p class="mt-[24px] text-[18px] font-bold leading-none text-[var(--color-black)]">
      {% trans "Вы уверены что хотите выйти?" %}
    </p>

    <form data-headless-logout-form method="post" action="#" class="mt-[24px] flex items-center justify-center gap-[21px]">
      {% csrf_token %}
      <button type="button" data-dialog-close class="btn-soft-pink h-[55px] w-[165px]">
        {% trans "отменить" %}
      </button>
      <button type="submit" class="btn-soft-green h-[55px] w-[165px]">
        {% trans "Выйти" %}
      </button>
    </form>
  </div>
</div>
