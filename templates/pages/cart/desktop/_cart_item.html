{% load static i18n %}

<article class="grid grid-cols-[244px_minmax(0,1fr)] gap-[30px] rounded-[20px] bg-[var(--color-white)] p-[20px] shadow-[0_14px_32px_rgba(0,0,0,0.08)] ring-1 ring-black/5">
  <div class="overflow-hidden rounded-[14px] bg-[var(--color-white)]">
    <img
      src="{{ item.image_url }}"
      alt="{{ item.title }}"
      class="h-[244px] w-full object-cover"
      draggable="false"
    >
  </div>

  <div class="flex min-w-0 items-start justify-between gap-[30px]">
    <div class="min-w-0 pt-[10px]">
      <p class="text-[16px] font-bold uppercase leading-none text-[var(--color-black-80)]">
        {% trans "Цифровой материал" %}
      </p>
      <h2 class="mt-[16px] max-w-[430px] text-[34px] font-bold leading-[34px] text-[var(--color-black)]">
        {{ item.title }}
      </h2>
      <p class="mt-[14px] text-[20px] leading-[20px] text-[var(--color-black-80)]">
        {{ item.kind }}
      </p>

      <div class="mt-[34px] flex items-center gap-[16px]">
        <button type="button" class="inline-flex h-[44px] w-[44px] cursor-pointer items-center justify-center rounded-[10px] bg-[var(--color-lilac)]">
          <img src="{% static 'images/icons/favorite-inactive.svg' %}" alt="" class="size-[22px]" aria-hidden="true">
        </button>
        <button type="button" class="inline-flex h-[44px] w-[44px] cursor-pointer items-center justify-center rounded-[10px] bg-[var(--color-mint)]">
          <img src="{% static 'images/icons/pdf.svg' %}" alt="" class="h-[22px] w-[18px]" aria-hidden="true">
        </button>
      </div>
    </div>

    <div class="flex shrink-0 flex-col items-end gap-[86px] pt-[4px]">
      <button type="button" class="inline-flex h-[34px] w-[34px] cursor-pointer items-center justify-center rounded-full bg-[var(--color-white)] shadow-[0_8px_18px_rgba(0,0,0,0.08)]" aria-label="{% trans 'Удалить товар' %}">
        <img src="{% static 'images/icons/close-icon.svg' %}" alt="" class="h-[20px] w-[20px]" aria-hidden="true">
      </button>
      <div class="text-[40px] font-bold leading-[40px] text-[var(--color-black)]">{{ item.price }}</div>
    </div>
  </div>
</article>
