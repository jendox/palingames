{% load static i18n %}

<article class="rounded-[5px] border border-[var(--color-grey)] bg-[var(--color-white)] px-[24px] py-[10px]">
  <div class="grid grid-cols-[18px_24px_100px_20px_minmax(0,1fr)] items-center">
    <button type="button" class="col-start-1 self-center inline-flex h-[18px] w-[18px] cursor-pointer items-center justify-center" aria-label="{% trans 'Удалить товар' %}">
      <img
        src="{% static 'images/icons/trash-green.svg' %}"
        sizes="18px"
        alt=""
        aria-hidden="true"
        class="h-full w-full object-contain"
      >
    </button>

    <div class="col-start-3 w-[100px] shrink-0 overflow-hidden rounded-[3px]">
      <img
        src="{{ item.image_url }}"
        alt="{{ item.title }}"
        class="h-[100px] w-full object-cover"
        draggable="false"
      >
    </div>

    <div class="col-start-5 min-w-0 pt-[10px] pb-[10px]">
      <h2 class="min-h-[28px] text-[12px] leading-[14px] font-semibold">
        {{ item.title }}
      </h2>
      <p class="mt-[7px] text-[10px]">
        {{ item.kind|lower }}
      </p>
      <div class="mt-[20px] text-[12px] font-black">{{ item.price }}</div>
    </div>
  </div>
</article>
