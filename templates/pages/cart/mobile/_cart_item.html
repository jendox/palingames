{% load static i18n %}

<article class="rounded-[20px] bg-[var(--color-white)] p-[12px] shadow-[0_14px_30px_rgba(0,0,0,0.06)] ring-1 ring-black/5">
  <div class="flex items-start gap-[12px]">
    <div class="w-[118px] shrink-0 overflow-hidden rounded-[14px]">
      <img
        src="{{ item.image_url }}"
        alt="{{ item.title }}"
        class="h-[118px] w-full object-cover"
        draggable="false"
      >
    </div>

    <div class="min-w-0 flex-1">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <h2 class="text-[20px] font-bold leading-[20px] text-[var(--color-black)]">
            {{ item.title }}
          </h2>
          <p class="mt-[8px] text-[12px] leading-[14px] text-[var(--color-black-80)]">
            {{ item.kind }}
          </p>
        </div>
        <button type="button" class="inline-flex h-[28px] w-[28px] shrink-0 cursor-pointer items-center justify-center" aria-label="{% trans 'Удалить товар' %}">
          <img src="{% static 'images/icons/close-icon.svg' %}" alt="" class="h-[16px] w-[16px]" aria-hidden="true">
        </button>
      </div>

      <div class="mt-[18px] flex items-end justify-between gap-3">
        <div class="text-[24px] font-bold leading-[24px] text-[var(--color-black)]">{{ item.price }}</div>
        <div class="flex items-center gap-[8px]">
          <button type="button" class="inline-flex h-[34px] w-[34px] cursor-pointer items-center justify-center rounded-[10px] bg-[var(--color-lilac)]">
            <img src="{% static 'images/icons/favorite-inactive.svg' %}" alt="" class="size-[18px]" aria-hidden="true">
          </button>
          <button type="button" class="inline-flex h-[34px] w-[34px] cursor-pointer items-center justify-center rounded-[10px] bg-[var(--color-mint)]">
            <img src="{% static 'images/icons/pdf.svg' %}" alt="" class="h-[17px] w-[14px]" aria-hidden="true">
          </button>
        </div>
      </div>
    </div>
  </div>
</article>
