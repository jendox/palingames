{% load static i18n %}

<details class="group rounded-[10px]" data-account-section="personal" {% if personal_form_expanded %}open{% endif %}>
  <summary class="account-nav-item w-full cursor-pointer list-none justify-between [&::-webkit-details-marker]:hidden">
    <span class="inline-flex items-center gap-[10px] text-[16px] font-bold">
      <img
        src="{% static 'images/account/personal-data-inactive.svg' %}"
        alt=""
        class="w-[26px]"
        aria-hidden="true"
        draggable="false"
      >
      {% trans "Личные данные" %}
    </span>
    <img
      src="{% static 'images/icons/arrow-down-black.svg' %}"
      alt=""
      class="account-disclosure-arrow w-[12px] shrink-0"
      aria-hidden="true"
      draggable="false"
    >
  </summary>

  <form method="post" action="{% url 'account' %}?tab=personal" class="mt-[20px]">
    {% csrf_token %}
    {% if personal_form_saved %}
      <div class="mb-[20px] rounded-[10px] border border-[var(--color-turquoise)] bg-[var(--color-mint)]/40 px-[16px] py-[14px] text-[14px] font-bold leading-[18px] text-[var(--color-black)]">
        {% trans "Личные данные обновлены." %}
      </div>
    {% endif %}
    {% if personal_form.non_field_errors %}
      <div class="mb-[20px] rounded-[10px] border border-red-200 bg-red-50 px-[16px] py-[14px] text-[14px] font-bold leading-[18px] text-red-800">
        {{ personal_form.non_field_errors }}
      </div>
    {% endif %}
    <label class="block">
      <span class="text-[14px] font-normal">{% trans "Имя" %}</span>
      <input
        type="text"
        name="{{ personal_form.first_name.html_name }}"
        value="{{ personal_form.first_name.value|default:'' }}"
        class="account-input account-input-thin mt-[10px] h-[40px]"
        autocomplete="given-name"
      >
      {% if personal_form.first_name.errors %}
        <p class="mt-[8px] text-[14px] font-bold leading-[18px] text-red-700">{{ personal_form.first_name.errors|join:", " }}</p>
      {% endif %}
    </label>

    <label class="mt-[20px] block">
      <span class="text-[14px] font-normal">{% trans "Фамилия" %}</span>
      <input
        type="text"
        name="{{ personal_form.last_name.html_name }}"
        value="{{ personal_form.last_name.value|default:'' }}"
        class="account-input account-input-thin mt-[10px] h-[40px]"
        autocomplete="family-name"
      >
      {% if personal_form.last_name.errors %}
        <p class="mt-[8px] text-[14px] font-bold leading-[18px] text-red-700">{{ personal_form.last_name.errors|join:", " }}</p>
      {% endif %}
    </label>

    <label class="mt-[20px] block">
      <span class="text-[14px] font-normal">{% trans "Email" %} *</span>
      <input
        type="email"
        name="{{ personal_form.email.html_name }}"
        value="{{ personal_form.email.value|default:'' }}"
        class="account-input account-input-thin mt-[10px] h-[40px] bg-[var(--color-grey)]/20 text-[var(--color-black-80)]"
        autocomplete="email"
        readonly
        disabled
      >
      {% if personal_form.email.errors %}
        <p class="mt-[8px] text-[14px] font-bold leading-[18px] text-red-700">{{ personal_form.email.errors|join:", " }}</p>
      {% endif %}
    </label>

    <button type="submit" class="btn-purple mt-[50px] h-[40px] w-full text-[16px] font-semibold">
      {% trans "Сохранить" %}
    </button>
  </form>
</details>
