{% load static i18n %}

<details class="group rounded-[10px]" data-account-section="favorites">
  <summary class="account-nav-item w-full cursor-pointer list-none justify-between [&::-webkit-details-marker]:hidden">
    <span class="inline-flex items-center gap-[10px] text-[16px] font-bold">
      <img
        src="{% static 'images/account/favorite-inactive.svg' %}"
        alt=""
        class="w-[26px]"
        aria-hidden="true"
        draggable="false"
      >
      {% trans "Избранное" %}
    </span>
    <img
      src="{% static 'images/icons/arrow-down-black.svg' %}"
      alt=""
      class="account-disclosure-arrow w-[12px] shrink-0"
      aria-hidden="true"
      draggable="false"
    >
  </summary>

  <div class="mt-[20px]" data-account-favorites>
    <div class="flex items-center justify-between gap-[10px]">
      <button
        type="button"
        data-account-filter="favorites"
        class="inline-flex h-[28px] w-[36px] items-center justify-center rounded-[10px] border-none bg-[var(--color-white)]"
        aria-label="{% trans 'Фильтр избранного' %}"
      >
        <img
          src="{% static 'images/icons/filter-icon.svg' %}"
          alt=""
          class="h-[28px] w-[36px]"
          aria-hidden="true"
          draggable="false"
        >
      </button>

      <div class="flex items-center gap-[20px]">
        <button
          type="button"
          data-account-favorites-view="list"
          aria-pressed="false"
          class="inline-flex h-[24px] w-[24px] items-center justify-center opacity-100"
          aria-label="{% trans 'Вид списком' %}"
        >
          <img
            src="{% static 'images/icons/list-view.svg' %}"
            alt=""
            class="h-[16px] w-[16px]"
            aria-hidden="true"
            draggable="false"
          >
        </button>
        <button
          type="button"
          data-account-favorites-view="grid"
          aria-pressed="false"
          class="inline-flex h-[24px] w-[24px] items-center justify-center opacity-100"
          aria-label="{% trans 'Вид плиткой' %}"
        >
          <img
            src="{% static 'images/icons/grid-view.svg' %}"
            alt=""
            class="h-[16px] w-[16px]"
            aria-hidden="true"
            draggable="false"
          >
        </button>
      </div>
    </div>

    <div class="mt-[15px]" data-account-favorites-list></div>
    <p class="mt-[15px] text-center text-[14px] leading-[18px] text-[var(--color-black-80)]" data-account-favorites-empty>
      {% trans "В избранном пока пусто." %}
    </p>
    <nav class="account-pagination mt-[15px]" aria-label="{% trans 'Пагинация избранного' %}" data-account-favorites-pagination data-pagination-variant="mobile"></nav>

    <template data-account-favorite-template>
      <div class="relative overflow-hidden rounded-[10px] border border-[var(--color-grey)] bg-[var(--color-white)]">
        <div class="aspect-[4/3] overflow-hidden bg-[var(--color-lilac)]">
          <img
            data-fav-img
            src="{% static 'images/home/hero/owl.svg' %}"
            alt=""
            class="h-full w-full object-cover"
            aria-hidden="true"
            draggable="false"
          >
        </div>
        <div class="p-[10px]">
          <div class="text-[12px] font-bold leading-[14px]" data-fav-title></div>
          <div class="mt-[8px] flex items-center justify-between gap-[10px]">
            <div class="text-[12px] font-bold leading-[14px] text-[var(--color-orange)]" data-fav-price></div>
            <button
              type="button"
              class="inline-flex h-[24px] w-[24px] items-center justify-center rounded-full bg-[var(--color-white)] shadow-[var(--shadow-default)]"
              aria-label="{% trans 'Убрать из избранного' %}"
            >
              <img
                src="{% static 'images/icons/favorite-active.svg' %}"
                alt=""
                class="h-[14px] w-[14px]"
                aria-hidden="true"
                draggable="false"
              >
            </button>
          </div>
        </div>
      </div>
    </template>
  </div>
</details>
