{% load static i18n %}

<details class="group rounded-[10px]" data-account-section="password" {% if password_form_expanded %}open{% endif %}>
  <summary class="account-nav-item w-full cursor-pointer list-none justify-between [&::-webkit-details-marker]:hidden">
    <span class="inline-flex items-center gap-[10px] text-[16px] font-bold">
      <img
        src="{% static 'images/account/change-pass-inactive.svg' %}"
        alt=""
        class="w-[26px]"
        aria-hidden="true"
        draggable="false"
      >
      {% trans "Смена пароля" %}
    </span>
    <img
      src="{% static 'images/icons/arrow-down-black.svg' %}"
      alt=""
      class="account-disclosure-arrow w-[12px] shrink-0"
      aria-hidden="true"
      draggable="false"
    >
  </summary>

  <form method="post" action="{% url 'account' %}?tab=password" class="mt-[20px]">
    {% csrf_token %}
    {% if password_form_saved %}
      <div class="mb-[20px] rounded-[10px] border border-[var(--color-turquoise)] bg-[var(--color-mint)]/40 px-[16px] py-[14px] text-[14px] font-bold leading-[18px] text-[var(--color-black)]">
        {% trans "Пароль обновлен." %}
      </div>
    {% endif %}
    {% if password_form.non_field_errors %}
      <div class="mb-[20px] rounded-[10px] border border-red-200 bg-red-50 px-[16px] py-[14px] text-[14px] font-bold leading-[18px] text-red-800">
        {{ password_form.non_field_errors }}
      </div>
    {% endif %}
    <label class="block">
      <span class="text-[14px] font-normal leading-[18px]">{% trans "Текущий пароль" %} *</span>
      <input
        type="password"
        name="{{ password_form.old_password.html_name }}"
        class="account-input account-input-thin mt-[10px] h-[40px]"
        autocomplete="current-password"
      >
      {% if password_form.old_password.errors %}
        <p class="mt-[8px] text-[14px] font-bold leading-[18px] text-red-700">{{ password_form.old_password.errors|join:", " }}</p>
      {% endif %}
    </label>

    <label class="mt-[20px] block">
      <span class="text-[14px] font-normal leading-[18px]">{% trans "Новый пароль" %} *</span>
      <input
        type="password"
        name="{{ password_form.new_password1.html_name }}"
        class="account-input account-input-thin mt-[10px] h-[40px]"
        autocomplete="new-password"
      >
      {% if password_form.new_password1.errors %}
        <p class="mt-[8px] text-[14px] font-bold leading-[18px] text-red-700">{{ password_form.new_password1.errors|join:", " }}</p>
      {% endif %}
    </label>

    <label class="mt-[20px] block">
      <span class="text-[14px] font-normal leading-[18px]">{% trans "Повторите новый пароль" %} *</span>
      <input
        type="password"
        name="{{ password_form.new_password2.html_name }}"
        class="account-input account-input-thin mt-[10px] h-[40px]"
        autocomplete="new-password"
      >
      {% if password_form.new_password2.errors %}
        <p class="mt-[8px] text-[14px] font-bold leading-[18px] text-red-700">{{ password_form.new_password2.errors|join:", " }}</p>
      {% endif %}
    </label>

    <button type="submit" class="btn-purple mt-[50px] h-[40px] w-full text-[16px] font-semibold">
      {% trans "Сохранить" %}
    </button>
  </form>
</details>
