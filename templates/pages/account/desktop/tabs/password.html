{% load i18n %}

<h2 class="text-[36px] font-bold leading-[47px]">{% trans "Смена пароля" %}</h2>

<form
  method="post"
  action="{% url 'account' %}?tab=password"
  class="mt-[50px] max-w-[683px]"
  hx-post="{% url 'account' %}?tab=password"
  hx-target="#account-desktop-shell"
  hx-swap="outerHTML"
>
  {% csrf_token %}
  {% if password_form_saved %}
    <div class="mb-[30px] rounded-[10px] border border-[var(--color-turquoise)] bg-[var(--color-mint)]/40 px-[20px] py-[16px] text-[18px] font-bold leading-[23px] text-[var(--color-black)]">
      {% trans "Пароль обновлен." %}
    </div>
  {% endif %}
  {% if password_form.non_field_errors %}
    <div class="mb-[30px] rounded-[10px] border border-red-200 bg-red-50 px-[20px] py-[16px] text-[16px] font-bold leading-[22px] text-red-800">
      {{ password_form.non_field_errors }}
    </div>
  {% endif %}

  <label class="block">
    <span class="text-[20px] font-bold leading-[26px]">{% trans "Текущий пароль" %} *</span>
    <input
      type="password"
      name="{{ password_form.old_password.html_name }}"
      class="account-input mt-[20px] h-[54px]"
      autocomplete="current-password"
    >
    {% if password_form.old_password.errors %}
      <p class="mt-[12px] text-[16px] font-bold leading-[20px] text-red-700">{{ password_form.old_password.errors|join:", " }}</p>
    {% endif %}
  </label>

  <label class="mt-[50px] block">
    <span class="text-[20px] font-bold leading-[26px]">{% trans "Новый пароль" %} *</span>
    <input
      type="password"
      name="{{ password_form.new_password1.html_name }}"
      class="account-input mt-[20px] h-[54px]"
      autocomplete="new-password"
    >
    {% if password_form.new_password1.errors %}
      <p class="mt-[12px] text-[16px] font-bold leading-[20px] text-red-700">{{ password_form.new_password1.errors|join:", " }}</p>
    {% endif %}
  </label>

  <label class="mt-[50px] block">
    <span class="text-[20px] font-bold leading-[26px]">{% trans "Повторите новый пароль" %} *</span>
    <input
      type="password"
      name="{{ password_form.new_password2.html_name }}"
      class="account-input mt-[20px] h-[54px]"
      autocomplete="new-password"
    >
    {% if password_form.new_password2.errors %}
      <p class="mt-[12px] text-[16px] font-bold leading-[20px] text-red-700">{{ password_form.new_password2.errors|join:", " }}</p>
    {% endif %}
  </label>

  <div class="mt-[30px] flex justify-end">
    <button type="submit" class="btn-purple h-[60px] w-[211px] text-[16px]">{% trans "Сохранить" %}</button>
  </div>
</form>
