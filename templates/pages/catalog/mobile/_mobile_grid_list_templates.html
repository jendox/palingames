{% load static i18n %}

<template data-catalog-mobile-grid-template>
  <article
    class="relative h-[213px] w-[170px] overflow-hidden rounded-[10px] bg-[var(--color-white)] shadow-[0_10px_24px_rgba(0,0,0,0.08)]"
    data-analytics-item
    data-analytics-item-id=""
    data-analytics-item-name=""
    data-analytics-item-category=""
    data-analytics-item-variant=""
    data-analytics-price=""
    data-analytics-currency=""
  >
    <a href="#" class="block" data-product-link>
      <div class="relative">
        <img
          data-product-image
          src="{% static 'images/example-product-image-1.png' %}"
          alt=""
          class="h-[213px] w-[170px] object-cover"
          draggable="false"
        >
        <div class="pointer-events-none absolute inset-x-0 bottom-0 h-[74px] bg-[rgba(31,31,31,0.34)] backdrop-blur-[4px]"></div>

        <div class="absolute left-[8px] top-[8px]">
          <div class="inline-flex items-center gap-[5px] rounded-[6px] bg-[rgba(31,31,31,0.3)] px-[7px] py-[4px] backdrop-blur-[4px]">
            <img src="{% static 'images/icons/star-bold.svg' %}" alt="" class="h-[12px] w-[12px]" aria-hidden="true">
            <span class="text-[10px] font-black leading-none text-[var(--color-white)]" data-product-rating></span>
          </div>
        </div>

        <div class="absolute right-[8px] top-[8px] z-20 flex flex-col gap-[6px]">
          <button
            type="button"
            class="inline-flex h-[20px] w-[20px] items-center justify-center transition-transform duration-200"
            aria-label="{% trans 'Добавить в избранное' %}"
            data-catalog-favorite-toggle
            data-product-id=""
            data-favorited="false"
          >
            <img
              src="{% static 'images/icons/favorite-inactive.svg' %}"
              alt=""
              class="h-[20px] w-[20px]"
              aria-hidden="true"
              data-favorite-icon
              data-icon-active="{% static 'images/icons/favorite-active.svg' %}"
              data-icon-inactive="{% static 'images/icons/favorite-inactive.svg' %}"
            >
          </button>
        </div>

        <div class="absolute inset-x-0 bottom-0 h-[74px] px-[10px] pb-[9px] text-[var(--color-white)]">
          <div class="pt-[10px]">
            <h2
              class="min-h-[24px] text-[10px] font-bold leading-[12px]"
              style="-webkit-box-orient: vertical; -webkit-line-clamp: 2; display: -webkit-box; overflow: hidden;"
              data-product-title
            ></h2>
            <p class="mt-[2px] text-[9px] leading-[11px] text-[rgba(255,255,255,0.84)]" data-product-kind></p>
          </div>
          <div class="absolute inset-x-[10px] bottom-[9px] flex items-center justify-between">
            <p class="text-[12px] font-black leading-none text-[var(--color-white)]" data-product-price></p>
          </div>
        </div>
      </div>
    </a>

    <div class="absolute bottom-[6px] right-[8px] z-20">
      <button
        type="button"
        class="catalog-card-cart-button inline-flex h-[32px] w-[32px] items-center justify-center transition-transform duration-200"
        aria-label="{% trans 'Добавить в корзину' %}"
        data-catalog-cart-toggle
        data-catalog-download-url=""
        data-product-download-link
        data-is-purchased="false"
        data-product-id=""
        data-in-cart="false"
        data-analytics-item-id=""
        data-analytics-item-name=""
        data-analytics-item-category=""
        data-analytics-item-variant=""
        data-analytics-price=""
        data-analytics-currency=""
      >
        <img
          src="{% static 'images/icons/cart-empty.svg' %}"
          alt=""
          class="h-[32px] w-[32px]"
          aria-hidden="true"
          data-cart-icon
          data-icon-empty="{% static 'images/icons/cart-empty.svg' %}"
          data-icon-full="{% static 'images/icons/cart-full.svg' %}"
          data-icon-download="{% static 'images/icons/download.svg' %}"
        >
      </button>
    </div>
  </article>
</template>

<template data-catalog-mobile-list-template>
  <article
    class="relative flex rounded-[10px] border border-[rgba(0,0,0,0.08)] bg-[var(--color-white)] p-[7px]"
    data-analytics-item
    data-analytics-item-id=""
    data-analytics-item-name=""
    data-analytics-item-category=""
    data-analytics-item-variant=""
    data-analytics-price=""
    data-analytics-currency=""
  >
    <a href="#" class="block h-[77px] w-[64px] shrink-0 overflow-hidden rounded-[5px]" data-product-link>
      <img
        data-product-image
        src="{% static 'images/example-product-image-1.png' %}"
        alt=""
        class="h-full w-full object-cover"
        draggable="false"
      >
    </a>

    <div class="min-w-0 flex-1 pl-[45px] pr-[61px]">
      <a href="#" data-product-link class="block">
        <h2
          class="min-h-[28px] text-[12px] font-bold leading-[14px] text-[var(--color-black)]"
          style="-webkit-box-orient: vertical; -webkit-line-clamp: 2; display: -webkit-box; overflow: hidden;"
          data-product-title
        ></h2>
      </a>
      <p class="mt-[6px] leading-[13px] text-[var(--color-black-80)]">
        <span class="text-[10px] font-semibold">{% trans "Категория:" %}</span>
        <span class="text-[10px] font-normal" data-product-category></span>
      </p>
      <p class="mt-[12px] text-[14px] font-black leading-[14px] text-[var(--color-black)]" data-product-price></p>
    </div>

    <button
      type="button"
      class="catalog-card-cart-button absolute bottom-[7px] right-[35px] inline-flex h-[32px] w-[32px] items-center justify-center rounded-[6px] border border-[rgba(0,0,0,0.04)] transition-transform duration-200"
      aria-label="{% trans 'Добавить в корзину' %}"
      data-catalog-cart-toggle
      data-cart-border-toggle
      data-catalog-download-url=""
      data-product-download-link
      data-is-purchased="false"
      data-product-id=""
      data-in-cart="false"
      data-analytics-item-id=""
      data-analytics-item-name=""
      data-analytics-item-category=""
      data-analytics-item-variant=""
      data-analytics-price=""
      data-analytics-currency=""
    >
      <img
        src="{% static 'images/icons/cart-empty.svg' %}"
        alt=""
        class="h-[32px] w-[32px]"
        aria-hidden="true"
        data-cart-icon
        data-icon-empty="{% static 'images/icons/cart-empty.svg' %}"
        data-icon-full="{% static 'images/icons/cart-full.svg' %}"
        data-icon-download="{% static 'images/icons/download.svg' %}"
      >
    </button>
  </article>
</template>
