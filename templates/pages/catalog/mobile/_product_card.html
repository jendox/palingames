{% load static i18n %}

<article
  class="h-[213px] w-[170px] overflow-hidden rounded-[10px] bg-[var(--color-white)] shadow-[0_10px_24px_rgba(0,0,0,0.08)]"
  data-analytics-item
  data-analytics-item-id="{{ product.id }}"
  data-analytics-item-name="{{ product.title }}"
  data-analytics-item-category="{{ product.category }}"
  data-analytics-item-variant="{{ product.kind }}"
  data-analytics-price="{{ product.price_value }}"
  data-analytics-currency="{{ product.currency }}"
>
  <div class="relative">
    <a href="{{ product.url }}" class="block">
      <img
        src="{{ product.image_url }}"
        alt="{{ product.title }}"
        class="h-[213px] w-[170px] object-cover"
        draggable="false"
      >
      <div class="pointer-events-none absolute inset-x-0 bottom-0 h-[74px] bg-[rgba(31,31,31,0.34)] backdrop-blur-[4px]"></div>

      <div class="absolute left-[8px] top-[8px]">
        <div class="inline-flex items-center gap-[5px] rounded-[6px] bg-[rgba(31,31,31,0.3)] px-[7px] py-[4px] backdrop-blur-[4px]">
          <img src="{% static 'images/icons/star-bold.svg' %}" alt="" class="h-[12px] w-[12px]" aria-hidden="true">
          <span class="text-[10px] font-black leading-none text-[var(--color-white)]">{{ product.rating }}</span>
        </div>
      </div>

      <div class="absolute right-[8px] top-[8px] z-20 flex flex-col gap-[6px]">
        <button
          type="button"
          class="inline-flex h-[20px] w-[20px] items-center justify-center transition-transform duration-200"
          aria-label="{% if product.is_favorited %}{% trans 'Удалить из избранного' %}{% else %}{% trans 'Добавить в избранное' %}{% endif %}"
          data-catalog-favorite-toggle
          data-product-id="{{ product.id }}"
          data-favorited="{% if product.is_favorited %}true{% else %}false{% endif %}"
        >
          <img
            src="{% static 'images/icons/' %}{% if product.is_favorited %}favorite-active.svg{% else %}favorite-inactive.svg{% endif %}"
            alt=""
            class="h-[20px] w-[20px]"
            aria-hidden="true"
            data-favorite-icon
            data-icon-active="{% static 'images/icons/favorite-active.svg' %}"
            data-icon-inactive="{% static 'images/icons/favorite-inactive.svg' %}"
          >
        </button>
        <button
          type="button"
          class="inline-flex h-[20px] w-[20px] items-center justify-center transition-transform duration-200"
          aria-label="{% trans 'Быстрый просмотр товара' %}"
          data-catalog-preview-open
          data-preview-title="{{ product.title }}"
          data-preview-category="{{ product.category }}"
          data-preview-price="{{ product.price }}"
          data-preview-rating="{{ product.rating }}"
          data-preview-image="{{ product.image_url }}"
          data-preview-url="{{ product.url }}"
          data-preview-content="{{ product.content }}"
        >
          <img src="{% static 'images/icons/preview.svg' %}" alt="" class="h-[20px] w-[20px]" aria-hidden="true">
        </button>
      </div>

      <div class="absolute inset-x-0 bottom-0 h-[74px] px-[10px] pb-[9px] text-[var(--color-white)]">
        <div class="pt-[10px]">
          <div
            class="min-h-[24px] text-[10px] font-bold leading-[12px]"
            style="-webkit-box-orient: vertical; -webkit-line-clamp: 2; display: -webkit-box; overflow: hidden;"
          >
            {{ product.title }}
          </div>
          <div class="mt-[2px] text-[9px] leading-[11px] text-[rgba(255,255,255,0.84)]">
            {{ product.category }}
          </div>
        </div>
        <div class="absolute inset-x-[10px] bottom-[9px] flex items-center justify-between">
          <div class="text-[12px] font-black leading-none">
            {{ product.price }}
          </div>
        </div>
      </div>
    </a>

    <div class="absolute bottom-[6px] right-[8px] z-20">
      {% if product.is_purchased %}
        <a
          href="{{ product.download_url }}"
          class="inline-flex h-[32px] w-[32px] items-center justify-center transition-transform duration-200"
          aria-label="{% trans 'Скачать' %}"
          title="{% trans 'Скачать' %}"
          data-product-download-link
        >
          <img
            src="{% static 'images/icons/download.svg' %}"
            alt=""
            class="h-[32px] w-[32px]"
            aria-hidden="true"
          >
        </a>
      {% else %}
        <button
          type="button"
          class="catalog-card-cart-button inline-flex h-[32px] w-[32px] items-center justify-center transition-transform duration-200 {% if product.is_in_cart %}catalog-card-cart-button-active{% endif %}"
          aria-label="{% if product.is_in_cart %}{% trans 'Удалить из корзины' %}{% else %}{% trans 'Добавить в корзину' %}{% endif %}"
          data-catalog-cart-toggle
          data-product-id="{{ product.id }}"
          data-in-cart="{% if product.is_in_cart %}true{% else %}false{% endif %}"
          data-analytics-item-id="{{ product.id }}"
          data-analytics-item-name="{{ product.title }}"
          data-analytics-item-category="{{ product.category }}"
          data-analytics-item-variant="{{ product.kind }}"
          data-analytics-price="{{ product.price_value }}"
          data-analytics-currency="{{ product.currency }}"
        >
          <img
            src="{% static 'images/icons/' %}{% if product.is_in_cart %}cart-full.svg{% else %}cart-empty.svg{% endif %}"
            alt=""
            class="h-[32px] w-[32px]"
            aria-hidden="true"
            data-cart-icon
            data-icon-empty="{% static 'images/icons/cart-empty.svg' %}"
            data-icon-full="{% static 'images/icons/cart-full.svg' %}"
          >
        </button>
      {% endif %}
    </div>
  </div>
</article>
