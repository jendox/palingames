{% load static i18n %}

{% if options or always_render %}
  <details class="filter-group group py-[16px]" {% if field_name == "age" and not disable_default_open %}open{% endif %}>
    <summary class="flex cursor-pointer list-none select-none items-center justify-between gap-[16px] outline-none">
      <span class="text-[18px] font-bold leading-[22px] text-[var(--color-black)]">{{ title }}</span>
      <span class="flex h-[8px] w-[12px] items-center justify-center" aria-hidden="true">
        <img
          src="{% static 'images/icons/arrow-down-black.svg' %}"
          alt=""
          class="filter-summary-arrow-down h-[8px] w-[12px]"
        >
        <img
          src="{% static 'images/icons/arrow-down-black.svg' %}"
          alt=""
          class="filter-summary-arrow-up h-[8px] w-[12px] rotate-180"
        >
      </span>
    </summary>
    <div class="space-y-[14px] pt-[18px]">
      {% for option in options %}
        <label class="checkbox-option flex w-full select-none items-start">
          <input type="checkbox" name="{{ field_name }}" value="{{ option.id }}" class="checkbox-purple mt-[1px] shrink-0" {% if option.selected %}checked{% endif %}>
          <span class="font-normal leading-[18px]">{{ option.label }}</span>
          {% if show_counts %}
            <span class="ml-auto shrink-0 text-[13px] text-[var(--color-black-80)]">{{ option.count }}</span>
          {% endif %}
        </label>
      {% endfor %}
    </div>
  </details>
{% endif %}
