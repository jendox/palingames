{% load static i18n %}

<article
  class="w-full max-w-[436px] overflow-hidden rounded-[14px] bg-[var(--color-white)] shadow-[0_18px_38px_rgba(0,0,0,0.08)]"
  data-analytics-item
  data-analytics-item-id="{{ product.id }}"
  data-analytics-item-name="{{ product.title }}"
  data-analytics-item-category="{{ product.category }}"
  data-analytics-item-variant="{{ product.kind }}"
  data-analytics-price="{{ product.price_value }}"
  data-analytics-currency="{{ product.currency }}"
>
  <div class="relative">
    <a href="{{ product.url }}" class="block">
      <img
        src="{{ product.image_url }}"
        alt="{{ product.title }}"
        class="aspect-[436/510] w-full object-cover"
        draggable="false"
      >
      <div class="pointer-events-none absolute inset-x-0 bottom-0 h-[175px] bg-[rgba(31,31,31,0.3)] backdrop-blur-[8px]"></div>

      <div class="absolute left-[15px] top-[15px]">
        <div class="inline-flex items-center gap-[10px] rounded-[8px] bg-[rgba(31,31,31,0.3)] px-[15px] py-[8px] backdrop-blur-[8px]">
          <img src="{% static 'images/icons/star-bold.svg' %}" alt="" class="size-[24px]" aria-hidden="true">
          <span class="text-[20px] font-black leading-none text-[var(--color-white)]">{{ product.rating }}</span>
        </div>
      </div>

      <div class="absolute inset-x-0 bottom-0 h-[175px] px-[20px] pb-[18px] text-[var(--color-white)]">
        <div class="pt-[28px]">
          <div
            class="min-h-[58px] text-[24px] font-bold leading-[1.2]"
            style="-webkit-box-orient: vertical; -webkit-line-clamp: 2; display: -webkit-box; overflow: hidden;"
          >
            {{ product.title }}
          </div>
          <div class="text-[16px] font-normal leading-[1.2] text-[rgba(255,255,255,0.84)]">
            {{ product.category }}
          </div>
        </div>
        <div class="absolute inset-x-[20px] bottom-[18px] flex items-center justify-between">
          <div class="text-[20px] font-black leading-none">
            {{ product.price }}
          </div>
        </div>
      </div>
    </a>

    <div class="absolute right-[35px] top-[15px] z-10 flex flex-col gap-[15px]">
      <button
        type="button"
        class="inline-flex h-[38px] w-[40px] cursor-pointer items-center justify-center transition-transform duration-200 hover:scale-[1.04]"
        aria-label="{% if product.is_favorited %}{% trans 'Удалить из избранного' %}{% else %}{% trans 'Добавить в избранное' %}{% endif %}"
        data-catalog-favorite-toggle
        data-product-id="{{ product.id }}"
        data-favorited="{% if product.is_favorited %}true{% else %}false{% endif %}"
      >
        <img
          src="{% static 'images/icons/' %}{% if product.is_favorited %}favorite-active.svg{% else %}favorite-inactive.svg{% endif %}"
          alt=""
          class="size-[40px]"
          aria-hidden="true"
          data-favorite-icon
          data-icon-active="{% static 'images/icons/favorite-active.svg' %}"
          data-icon-inactive="{% static 'images/icons/favorite-inactive.svg' %}"
        >
      </button>
      <button
        type="button"
        class="inline-flex h-[38px] w-[40px] cursor-pointer items-center justify-center transition-transform duration-200 hover:scale-[1.04]"
        aria-label="{% trans 'Быстрый просмотр товара' %}"
        data-catalog-preview-open
        data-preview-title="{{ product.title }}"
        data-preview-category="{{ product.category }}"
        data-preview-price="{{ product.price }}"
        data-preview-rating="{{ product.rating }}"
        data-preview-image="{{ product.image_url }}"
        data-preview-url="{{ product.url }}"
        data-preview-content="{{ product.content }}"
      >
        <img src="{% static 'images/icons/preview.svg' %}" alt="" class="size-[40px]" aria-hidden="true">
      </button>
    </div>

    <div class="absolute bottom-[18px] right-[20px] z-10">
      {% if product.is_purchased %}
        <a
          href="{{ product.download_url }}"
          class="inline-flex size-[60px] shrink-0 cursor-pointer items-center justify-center transition-transform duration-200 hover:scale-[1.04]"
          aria-label="{% trans 'Скачать' %}"
          title="{% trans 'Скачать' %}"
          data-product-download-link
        >
          <img
            src="{% static 'images/icons/download.svg' %}"
            alt=""
            class="h-[60px] w-[60px]"
            aria-hidden="true"
          >
        </a>
      {% else %}
        <button
          type="button"
          class="catalog-card-cart-button inline-flex size-[60px] shrink-0 cursor-pointer items-center justify-center transition-transform duration-200 hover:scale-[1.04] {% if product.is_in_cart %}catalog-card-cart-button-active{% endif %}"
          aria-label="{% if product.is_in_cart %}{% trans 'Удалить из корзины' %}{% else %}{% trans 'Добавить в корзину' %}{% endif %}"
          data-catalog-cart-toggle
          data-product-id="{{ product.id }}"
          data-in-cart="{% if product.is_in_cart %}true{% else %}false{% endif %}"
          data-analytics-item-id="{{ product.id }}"
          data-analytics-item-name="{{ product.title }}"
          data-analytics-item-category="{{ product.category }}"
          data-analytics-item-variant="{{ product.kind }}"
          data-analytics-price="{{ product.price_value }}"
          data-analytics-currency="{{ product.currency }}"
        >
          <img
            src="{% static 'images/icons/' %}{% if product.is_in_cart %}cart-full.svg{% else %}cart-empty.svg{% endif %}"
            alt=""
            class="h-[60px] w-[60px]"
            aria-hidden="true"
            data-cart-icon
            data-icon-empty="{% static 'images/icons/cart-empty.svg' %}"
            data-icon-full="{% static 'images/icons/cart-full.svg' %}"
          >
        </button>
      {% endif %}
    </div>
  </div>
</article>
