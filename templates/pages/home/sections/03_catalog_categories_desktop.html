{% load static i18n %}

<section class="bg-[var(--color-white)]">
  <div class="mx-auto w-full max-w-[1440px] px-4 py-[100px]">
    <div class="mx-auto grid max-w-[612px] grid-cols-2 justify-center gap-x-8 gap-y-10 xl:max-w-[1320px] xl:grid-cols-4 xl:gap-x-10 xl:gap-y-0 2xl:max-w-[1368px] 2xl:gap-x-12">
      <a
        href="{% url 'catalog' %}?category=didakticheskiye-igry&age=1"
        class="group block w-[290px] xl:w-[300px]"
      >
        <div class="relative h-[410px] w-[290px] overflow-hidden rounded-[16px] bg-[#FCDFD9] xl:h-[424px] xl:w-[300px]">
          <img
            src="{% static 'images/home/catalog_categories/teddy.svg' %}"
            alt=""
            class="h-full w-full select-none"
            aria-hidden="true"
            draggable="false"
          >
          <div class="absolute bottom-[36px] left-0 right-0 text-center font-airfool text-[40px] leading-[40px] text-[var(--color-black)]">
            {% trans "2-3 года" %}
          </div>
        </div>
      </a>

      <a
        href="{% url 'catalog' %}?category=didakticheskiye-igry&age=2"
        class="group block w-[290px] xl:w-[300px]"
      >
        <div class="relative h-[410px] w-[290px] overflow-hidden rounded-[16px] bg-[#E8FFC3] xl:h-[424px] xl:w-[300px]">
          <img
            src="{% static 'images/home/catalog_categories/robot.svg' %}"
            alt=""
            class="h-full w-full select-none"
            aria-hidden="true"
            draggable="false"
          >
          <div class="absolute bottom-[36px] left-0 right-0 text-center font-airfool text-[40px] leading-[40px] text-[var(--color-black)]">
            {% trans "4-5 лет" %}
          </div>
        </div>
      </a>

      <a
        href="{% url 'catalog' %}?category=didakticheskiye-igry&age=3"
        class="group block w-[290px] xl:w-[300px]"
      >
        <div class="relative h-[410px] w-[290px] overflow-hidden rounded-[16px] bg-[#FFF2C3] xl:h-[424px] xl:w-[300px]">
          <img
            src="{% static 'images/home/catalog_categories/ball.svg' %}"
            alt=""
            class="h-full w-full select-none"
            aria-hidden="true"
            draggable="false"
          >
          <div class="absolute bottom-[36px] left-0 right-0 text-center font-airfool text-[40px] leading-[40px] text-[var(--color-black)]">
            {% trans "6-7 лет" %}
          </div>
        </div>
      </a>

      <a
        href="{% url 'catalog' %}?category=metodicheskie-materialy"
        class="group block w-[290px] xl:w-[300px]"
      >
        <div class="relative h-[410px] w-[290px] overflow-hidden rounded-[16px] bg-[#D1FBFA] xl:h-[424px] xl:w-[300px]">
          <img
            src="{% static 'images/home/catalog_categories/teacher.svg' %}"
            alt=""
            class="h-full w-full select-none"
            aria-hidden="true"
            draggable="false"
          >
          <div class="absolute bottom-[36px] left-0 right-0 text-center font-airfool text-[40px] leading-[40px] text-[var(--color-black)]">
            {% trans "Педагогам" %}
          </div>
        </div>
      </a>
    </div>
  </div>
</section>
