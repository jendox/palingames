{% load static i18n %}

<section class="bg-[var(--color-white)]">

            src="{% static 'images/home/catalog_categories/teddy.svg' %}"
            alt=""
            class="h-full w-full select-none"
            aria-hidden="true"
            draggable="false"
          >
          <div class="absolute bottom-[36px] left-0 right-0 text-center font-airfool text-[40px] leading-[40px] text-[var(--color-black)]">
            {% trans "2-3 года" %}
          </div>
        </div>
