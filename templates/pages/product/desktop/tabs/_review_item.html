{% load static i18n %}

<article>
  <div class="flex items-start justify-between gap-[24px]">
    <div class="min-w-0">
      <div class="text-[18px] font-regular leading-[18px] text-[var(--color-black)]">{{ review.author }}</div>
      <div class="mt-[20px] flex items-center gap-[9px]">
        {% for _ in "12345" %}
          {% if forloop.counter <= review.rating %}
            <img src="{% static 'images/icons/star-bold.svg' %}" alt="" class="size-[15px]" aria-hidden="true">
          {% else %}
            <img src="{% static 'images/icons/star-empty.svg' %}" alt="" class="size-[15px]" aria-hidden="true">
          {% endif %}
        {% endfor %}
      </div>
    </div>
    <div class="pt-[2px] text-[14px] leading-[14px] text-[var(--color-black-80)]">{{ review.date }}</div>
  </div>

  <p class="mt-[20px] max-w-[580px] text-[16px] leading-[21px] text-[var(--color-black-80)]">
    {{ review.text }}
  </p>
</article>
