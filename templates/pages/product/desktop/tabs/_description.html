{% load i18n %}

<div class="max-w-[610px] pt-[22px] text-[18px] leading-[22px] text-[var(--color-black-80)]">
  <div class="prose prose-p:mt-0 prose-p:mb-[18px] prose-ul:mb-[18px] prose-ul:mt-0 prose-li:my-0 max-w-none text-inherit">
    {{ product_description_html|safe }}
  </div>

  {% if product.age_groups.exists %}
    <div class="mt-[18px] text-[18px] leading-[22px] text-[var(--color-black)]">
      <p>
        <span class="font-bold">{% trans "Возраст:" %}</span>
        {% for age_group in product.age_groups.all %}{{ age_group }}{% if not forloop.last %}, {% endif %}{% endfor %}
      </p>
    </div>
  {% endif %}
</div>
