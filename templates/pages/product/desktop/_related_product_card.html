{% load static i18n %}

<article class="w-[320px] shrink-0 snap-start overflow-hidden rounded-[14px] bg-[var(--color-white)] shadow-[0_16px_34px_rgba(0,0,0,0.07)] min-[1600px]:w-[360px]">
  <div class="relative">
    <img
      src="{% static 'images/example-product-image-2.png' %}"
      alt=""
      class="h-[248px] w-full object-cover min-[1600px]:h-[272px]"
      aria-hidden="true"
      draggable="false"
    >
    <button
      type="button"
      class="absolute right-[12px] top-[12px] inline-flex size-[28px] items-center justify-center rounded-full bg-[rgba(255,255,255,0.92)] shadow-[0_8px_20px_rgba(0,0,0,0.08)]"
      aria-label="{% trans 'Убрать из избранного' %}"
    >
      <img src="{% static 'images/icons/favorite-active.svg' %}" alt="" class="size-[16px]" aria-hidden="true">
    </button>
  </div>

  <div class="bg-[linear-gradient(180deg,rgba(156,165,111,0.82)_0%,rgba(116,122,82,0.98)_100%)] px-[18px] pb-[16px] pt-[14px] text-[var(--color-white)] min-[1600px]:px-[22px] min-[1600px]:pb-[18px] min-[1600px]:pt-[16px]">
    <h3 class="text-[18px] font-bold leading-[23px] min-[1600px]:text-[20px] min-[1600px]:leading-[25px]">
      {% trans "Белорусский национальный строй" %}
    </h3>
    <p class="mt-[6px] text-[11px] leading-[14px] text-[rgba(255,255,255,0.8)] min-[1600px]:text-[12px]">
      {% trans "дидактическая игра" %}
    </p>
    <div class="mt-[14px] flex items-center justify-between">
      <div class="text-[20px] font-bold leading-[24px] min-[1600px]:text-[22px]">1,5 BYN</div>
      <button
        type="button"
        class="inline-flex size-[28px] items-center justify-center rounded-[8px] bg-[rgba(255,255,255,0.9)]"
        aria-label="{% trans 'Скачать PDF' %}"
      >
        <img src="{% static 'images/icons/pdf.svg' %}" alt="" class="h-[15px] w-[13px]" aria-hidden="true">
      </button>
    </div>
  </div>
</article>
