{% extends "email/base.html" %}

{% block content %}
  <p>Новый отзыв ожидает модерации.</p>
  <p><strong>Игра:</strong> {{ product.title }}</p>
  <p><strong>Пользователь:</strong> {{ user.email }}</p>
  <p><strong>Оценка:</strong> {{ review.rating }}/5</p>
  <p><strong>Текст отзыва:</strong></p>
  <p style="white-space: pre-wrap;">{{ review.comment }}</p>
  <p><a href="{{ admin_review_url }}">Открыть отзыв в админке</a></p>
{% endblock %}
